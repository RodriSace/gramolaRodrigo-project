<div class="auth-container">
    <div class="login-card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Spotify_logo_with_text.svg" alt="Spotify" class="spotify-logo">
        <h2>Nueva Contraseña</h2>
        <p class="subtitle">Ingresa tu nueva contraseña para acceder a la Gramola Virtual</p>

        <div *ngIf="successMessage" class="success-message" style="color: #1db954; background: rgba(29, 185, 84, 0.1); border: 1px solid #1db954; padding: 12px; border-radius: 8px; margin-bottom: 20px;">
            {{ successMessage }}
        </div>
        <div *ngIf="errorMessage" class="error-message">
            {{ errorMessage }}
        </div>

        <form (submit)="onReset($event)" *ngIf="!successMessage">
            <div class="form-group">
                <label for="password">Nueva Contraseña</label>
                <input type="password" id="password" name="password" [(ngModel)]="newPassword" required placeholder="Mínimo 6 caracteres">
            </div>

            <button type="submit" class="auth-btn" [disabled]="loading || !token">
                <span *ngIf="!loading">Guardar Contraseña</span>
                <span *ngIf="loading" class="spinner"></span>
            </button>
        </form>

        <div class="auth-footer" *ngIf="successMessage">
            <a routerLink="/login" class="auth-btn" style="display: block; text-align: center; text-decoration: none; padding: 16px; box-sizing: border-box;">Ir al Inicio de Sesión</a>
        </div>
    </div>
</div>
